<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      margin: 0;
      padding: 0;
    }

    .wrapper {
      max-width: 600px;
      margin: 30px auto;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12) !important;
    }

    .header {
      background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
      padding: 32px 24px;
      text-align: center;
    }

    .header img {
      width: 60px;
      margin-bottom: 12px;
    }

    .header h1 {
      color: #fff;
      margin: 0;
      font-size: 24px;
      letter-spacing: 1px;
    }

    .header p {
      color: #bbdefb;
      margin: 6px 0 0;
      font-size: 13px;
    }

    .badge {
      display: inline-block;
      background: #fff;
      color: #1a73e8;
      font-size: 11px;
      font-weight: bold;
      padding: 4px 12px;
      border-radius: 20px;
      margin-top: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .body {
      padding: 32px 28px;
    }

    .body h3 {
      color: #0d47a1;
      margin: 0 0 20px;
      font-size: 17px;
      border-left: 4px solid #1a73e8;
      padding-left: 10px;
    }

    .field {
      display: flex;
      align-items: flex-start;
      margin-bottom: 16px;
      border-radius: 8px;
      overflow: hidden;
    }

    .field-label {
      background: #1a73e8;
      color: #fff;
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 10px 14px;
      min-width: 110px;
      display: flex;
      align-items: center;
    }

    .icon {
      display: block;
      margin-right: 10px;
      font-size: 20px;
    }

    .field-value {
      background: #f8faff;
      color: #222;
      font-size: 14px;
      padding: 10px 16px;
      flex: 1;
      border: 1px solid #e3eaff;
      border-left: none;
      width: 100%;
    }

    .message-box {
      background: #f8faff;
      border: 1px solid #e3eaff;
      border-radius: 8px;
      padding: 14px 16px;
      margin-top: 8px;
    }

    .message-label {
      color: #1a73e8;
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    .message-text {
      color: #444;
      font-size: 14px;
      line-height: 1.6;
    }

    .divider {
      border: none;
      border-top: 1px solid #e3eaff;
      margin: 24px 0;
    }

    .footer {
      background: #f0f4f8;
      padding: 18px 24px;
      text-align: center;
    }

    .footer p {
      color: #90a4ae;
      font-size: 11px;
      margin: 0;
    }

    .footer strong {
      color: #1a73e8;
    }
  </style>
</head>

<body>
  <div class="wrapper">

    <!-- HEADER -->
    <div class="header">
      <h1><span class="icon">✈️</span> Cheers and Fly Vacations</h1>
      <p>Your Dream Holiday Partner</p>
      <span class="badge">New Enquiry Received</span>
    </div>

    <!-- BODY -->
    <div class="body">
      <h3>Enquiry Details</h3>

      <div class="field">
        <div class="field-label"><span class="icon">👤</span> Name</div>
        <div class="field-value">{{NAME}}</div>
      </div>

      <div class="field">
        <div class="field-label"><span class="icon">📧</span> Email</div>
        <div class="field-value">{{EMAIL}}</div>
      </div>

      <div class="field">
        <div class="field-label"><span class="icon">📞</span> Phone</div>
        <div class="field-value">{{PHONE}}</div>
      </div>

      <div class="field">
        <div class="field-label"><span class="icon">🌍</span> Services</div>
        <div class="field-value">{{GET_QUOTE_OF}}</div>
      </div>

      {{MESSAGE_BLOCK}}
    </div>

    <!-- FOOTER -->
    <div class="footer">
      <p>This enquiry was submitted via <strong>cheersandfly.com</strong></p>
      <p style="margin-top:6px;">© 2026 Cheers and Fly Vacations. All rights reserved.</p>
    </div>

  </div>
</body>

</html>
