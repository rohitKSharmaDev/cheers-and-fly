<html>

<head>
  <title>Travel Enquiry from Cheers and Fly Vacations</title>
</head>

<body>
  <h1 style="text-align:center; font-family: sans-serif; color: #1c4c81;">Travel Enquiry from Cheers and Fly
    Vacations</h1>

  <img src="http://cheersandfly.com/assets/images/logo-navbar.png"
    style="display: block; margin: 0 auto; width: 150px; margin-bottom: 10px;">

  <table border="0" cellpadding="0" cellspacing="0"
    style="background: #307fd4; border: 1px solid #1c4c81; padding: 2.5em 1em; width: 100%; margin: 0 auto;">
    <table border="0" cellpadding="5" cellspacing="0"
      style="width: 90%; margin: 0 auto; padding: 2em 1em; background: #1c4c81;">
      <thead>
        <th
          style="font-size: 1.75em; font-family: sans-serif, Arial; color: #eee; font-weight: 500; text-align: left; text-transform: uppercase; font-weight: bold;">
          Fields</th>
        <th
          style="font-size: 1.75em; font-family: sans-serif, Arial; color: #eee; font-weight: 500; text-align: left; text-transform: uppercase; font-weight: bold;">
          Information(for Enquiry)</th>
      </thead>
      <tbody>
        <tr>
          <td
            style="font-family: sans-serif; color: #fff; font-size: 1.15em; padding: 0.5em; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">
            Name :-</td>
          <td
            style="font-family: sans-serif; color: #eee; font-size: 1.25em; padding: 0.5em; font-weight: 500; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">
            {{name}}</td>
        </tr>
        <tr>
          <td
            style="font-family: sans-serif; color: #fff; font-size: 1.15em; padding: 0.5em; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">
            Email :-</td>
          <td
            style="font-family: sans-serif; color: #fff; font-size: 1.25em; padding: 0.5em; font-weight: 500; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">
            <a href="#"
              style="font-family: sans-serif; color: #fff; font-size: 1.25em; font-weight: 500; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">{{email}}</a>
          </td>
        </tr>
        <tr>
          <td
            style="font-family: sans-serif; color: #fff; font-size: 1.15em; padding: 0.5em; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">
            Phone No. :-</td>
          <td
            style="font-family: sans-serif; color: #eee; font-size: 1.25em; padding: 0.5em; font-weight: 500; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">
            {{phone}}</td>
        </tr>
        <tr>
          <td
            style="font-family: sans-serif; color: #fff; font-size: 1.15em; padding: 0.5em; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">
            Quotation for :-</td>
          <td
            style="font-family: sans-serif; color: #eee; font-size: 1.25em; padding: 0.5em; font-weight: 500; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">
            {{getQuoteOf}}</td>
        </tr>

      </tbody>
      <tfoot>
        <tr>
          <td colspan="2" style="text-align: center; font-size: 1em; color: #fff; padding-top: 1.5em;">Please contact
            them as soon as possible and get your booking confirmed.</td>
        </tr>
      </tfoot>
    </table>
  </table>
</body>

</html>
